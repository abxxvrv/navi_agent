<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Navi Agent Promotional Page</title>
  <desc id="desc">A magazine style promotional page for Navi Agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6efe4"/>
      <stop offset="0.52" stop-color="#ede1d1"/>
      <stop offset="1" stop-color="#dfd1bf"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36322d"/>
      <stop offset="1" stop-color="#7f7468"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#b9ab98" opacity="0.25"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#3a3027" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#dots)" opacity="0.55"/>
  <rect x="44" y="44" width="1192" height="632" fill="none" stroke="#c9b9a5"/>

  <g font-family="Inter, Arial, sans-serif" fill="#6b6259">
    <text x="78" y="80" font-size="12" letter-spacing="6" fill="#a39788">NAVI AGENT / LOCAL PROJECT NAVIGATOR</text>
    <text x="1110" y="84" font-size="13" text-anchor="end" letter-spacing="4" fill="#a39788">v0.1.0</text>
  </g>

  <g transform="translate(96 160)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="96" fill="url(#ink)">Navi Agent</text>
    <text x="4" y="62" font-family="Inter, Arial, sans-serif" font-size="25" letter-spacing="7" fill="#a86d50">READ / EDIT / RUN / REMEMBER</text>
    <line x1="0" y1="98" x2="560" y2="98" stroke="#c0ad99"/>

    <text x="0" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#4d4741">把本地项目变成</text>
    <text x="0" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="64" fill="#b96f4f">可执行的对话现场</text>

    <text x="0" y="276" font-family="Inter, Arial, sans-serif" font-size="21" fill="#665d53">Navi 在你的 workspace 里理解上下文，调用工具，加载技能，</text>
    <text x="0" y="310" font-family="Inter, Arial, sans-serif" font-size="21" fill="#665d53">把“看代码、改文件、跑验证、查历史”收束成一个 CLI 工作流。</text>
  </g>

  <g transform="translate(780 150)" filter="url(#shadow)">
    <rect width="360" height="390" rx="10" fill="#211f1c"/>
    <rect x="22" y="24" width="316" height="342" rx="6" fill="#11100e"/>
    <circle cx="44" cy="45" r="5" fill="#d36f4f"/>
    <circle cx="64" cy="45" r="5" fill="#d7b456"/>
    <circle cx="84" cy="45" r="5" fill="#71a56b"/>

    <g font-family="'Cascadia Mono', Consolas, monospace" font-size="16">
      <text x="42" y="92" fill="#d8d1c8">You &gt; inspect this repo</text>
      <text x="42" y="136" fill="#8fcfba">• Read cli.py</text>
      <text x="42" y="170" fill="#8fcfba">• Load skill: docx</text>
      <text x="42" y="204" fill="#8fcfba">• Patch tool.py</text>
      <text x="42" y="238" fill="#8fcfba">• Run py_compile</text>
      <text x="42" y="294" fill="#f1eadf">Navi &gt; verified.</text>
    </g>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(96 594)">
      <text x="0" y="0" font-size="16" letter-spacing="4" fill="#a39788">01</text>
      <text x="0" y="32" font-size="22" fill="#443f39">Workspace-aware tools</text>
    </g>
    <g transform="translate(430 594)">
      <text x="0" y="0" font-size="16" letter-spacing="4" fill="#a39788">02</text>
      <text x="0" y="32" font-size="22" fill="#443f39">Skill-driven execution</text>
    </g>
    <g transform="translate(780 594)">
      <text x="0" y="0" font-size="16" letter-spacing="4" fill="#a39788">03</text>
      <text x="0" y="32" font-size="22" fill="#443f39">Session trace memory</text>
    </g>
  </g>
</svg>

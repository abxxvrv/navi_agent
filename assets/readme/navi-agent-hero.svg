<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Navi Agent Hero Animation</title>
  <desc id="desc">A quiet text animation introducing Navi Agent.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f3ea"/>
      <stop offset="0.55" stop-color="#f2eadc"/>
      <stop offset="1" stop-color="#ebe0d0"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1f1b17" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="0" fill="url(#paper)"/>
  <rect x="34" y="32" width="1132" height="276" fill="none" stroke="#d6c8b7" stroke-opacity="0.7"/>

  <g font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" fill="#56514a">
    <text x="600" y="74" font-size="14" letter-spacing="10" fill="#a99c8c">LOCAL AGENT / SKILL RUNTIME / SESSION MEMORY</text>

    <text x="600" y="160" font-size="64" font-weight="500" filter="url(#softShadow)">Navi Agent</text>

    <g font-size="34" font-style="italic">
      <text x="600" y="220" opacity="1">
        read the project
        <animate attributeName="opacity" values="1;1;0;0;0;0;1" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="220" opacity="0">
        load the right skill
        <animate attributeName="opacity" values="0;0;1;1;0;0;0" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="600" y="220" opacity="0">
        verify the change
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" dur="8s" repeatCount="indefinite"/>
      </text>
    </g>

    <text x="600" y="272" font-size="15" letter-spacing="4" fill="#9b8f80">A LOCAL CLI AGENT FOR REAL PROJECT WORK</text>
  </g>

  <circle cx="438" cy="215" r="4" fill="#c46f4b"/>
  <circle cx="762" cy="215" r="4" fill="#c46f4b"/>
</svg>

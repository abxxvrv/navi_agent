<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Navi</title>
<style>
:root {
  --bg: #f6f5f1;
  --surface: #ffffff;
  --surface-2: #efede7;
  --text: #201f1c;
  --text-2: #6d6b63;
  --text-3: #a5a29a;
  --border: #e6e3db;
  --border-2: #d5d1c7;
  --btn-bg: #23221f;
  --btn-fg: #ffffff;
  --ok: #3d7a4e;
  --warn: #966424;
  --warn-bg: #f7efdd;
  --warn-border: #e8d6b0;
  --err: #b04a38;
  --err-bg: #f9e9e5;
  --sans: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: ui-monospace, "Cascadia Code", Consolas, "Courier New", monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #171613;
    --surface: #1e1d19;
    --surface-2: #2a2924;
    --text: #eae8e2;
    --text-2: #9b988f;
    --text-3: #6c6a62;
    --border: #32302a;
    --border-2: #423f37;
    --btn-bg: #eae8e2;
    --btn-fg: #1e1d19;
    --warn-bg: #322a1a;
    --warn-border: #57482a;
    --err-bg: #3a251f;
  }
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }
html, body { height: 100%; margin: 0; }
body {
  display: flex;
  font-family: var(--sans);
  color: var(--text);
  background: var(--surface);
  font-size: 15px;
  overflow: hidden;
}

/* ── 侧栏 ─────────────────────────────── */
aside {
  width: 240px;
  flex: none;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-right: 1px solid var(--border);
}
.side-head {
  display: flex;
  align-items: center;
  padding: 16px 14px 10px;
  gap: 8px;
}
.wordmark { font-size: 15px; font-weight: 600; letter-spacing: .3px; flex: 1; }
.icon-btn {
  width: 28px; height: 28px;
  border: 0; border-radius: 8px;
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }
.icon-btn:disabled { opacity: .35; cursor: default; }
#session-filter {
  margin: 0 12px 8px;
  height: 30px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  font: 12.5px var(--sans);
  padding: 0 10px;
  outline: none;
}
#session-filter:focus { border-color: var(--border-2); }
#session-list { flex: 1; overflow-y: auto; padding: 2px 8px 8px; }
.session-item {
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 1px;
}
.session-item:hover { background: var(--surface-2); }
.session-item.active { background: var(--surface-2); }
.session-item .title {
  font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-item .time { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
.side-empty { padding: 10px 12px; font-size: 12.5px; color: var(--text-3); }

/* ── 网关 ─────────────────────────────── */
#gateways { border-top: 1px solid var(--border); padding: 10px 14px 14px; }
#gateways h3 { margin: 0 0 6px; font-size: 11.5px; font-weight: 500; color: var(--text-3); }
.gw-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.gw-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); flex: none; }
.gw-dot.on { background: var(--ok); }
.gw-dot.err { background: var(--err); }
.gw-name { font-size: 12.5px; flex: none; }
.gw-account {
  flex: 1;
  font: 11px var(--mono);
  color: var(--text-3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gw-btn {
  border: 0; background: transparent;
  font-size: 12px; color: var(--text-2);
  cursor: pointer; padding: 2px 4px; border-radius: 6px;
}
.gw-btn:hover { background: var(--surface-2); color: var(--text); }
.gw-btn:disabled { opacity: .4; cursor: default; }
.gw-error { font-size: 11px; color: var(--err); margin: 0 0 4px 15px; word-break: break-all; }

/* ── 主区 ─────────────────────────────── */
main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
header {
  height: 50px; flex: none;
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
}
#workspace { font: 12px var(--mono); color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.spacer { flex: 1; }
.pill {
  font-size: 12px; color: var(--text-2);
  border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 999px;
  white-space: nowrap;
}
#conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--err); flex: none; transition: background .3s; }
#conn-dot.on { background: var(--ok); }

#chat-scroll { flex: 1; overflow-y: auto; }
#chat {
  max-width: 780px; margin: 0 auto;
  padding: 28px 28px 12px;
  display: flex; flex-direction: column; gap: 16px;
}
#chat:empty::before {
  content: "开始新的对话";
  align-self: center;
  margin-top: 28vh;
  font-size: 14px;
  color: var(--text-3);
}
#chat > * { animation: rise .18s ease; }
@keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.msg-user {
  align-self: flex-end;
  max-width: 85%;
  background: var(--surface-2);
  padding: 9px 14px;
  border-radius: 16px 16px 4px 16px;
  font-size: 14.5px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-user .img-tag { font-size: 12.5px; color: var(--text-2); display: block; }

.msg-assistant { font-size: 15px; line-height: 1.75; word-break: break-word; }
.msg-assistant > :first-child { margin-top: 0; }
.msg-assistant > :last-child { margin-bottom: 0; }
.msg-assistant p { margin: .6em 0; }
.msg-assistant h1 { font-size: 19px; } .msg-assistant h2 { font-size: 17px; } .msg-assistant h3 { font-size: 15.5px; }
.msg-assistant code {
  font: 13px var(--mono);
  background: var(--surface-2);
  padding: 1.5px 5px; border-radius: 5px;
}
.msg-assistant pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  overflow-x: auto;
}
.msg-assistant pre code { background: none; padding: 0; font-size: 12.5px; line-height: 1.6; }
.msg-assistant ul, .msg-assistant ol { padding-left: 1.4em; margin: .5em 0; }
.msg-assistant blockquote {
  margin: .6em 0; padding: 0 0 0 12px;
  border-left: 2px solid var(--border-2);
  color: var(--text-2);
}
.msg-assistant table { border-collapse: collapse; font-size: 13.5px; margin: .6em 0; }
.msg-assistant th, .msg-assistant td { border: 1px solid var(--border); padding: 5px 10px; }
.msg-assistant a { color: inherit; }

details.reasoning { font-size: 12.5px; }
details.reasoning summary {
  color: var(--text-3); cursor: pointer; user-select: none;
  list-style: none; display: inline-flex; align-items: center; gap: 5px;
}
details.reasoning summary::-webkit-details-marker { display: none; }
details.reasoning summary::before {
  content: ""; width: 5px; height: 5px;
  border-right: 1.5px solid var(--text-3); border-bottom: 1.5px solid var(--text-3);
  transform: rotate(-45deg); transition: transform .15s;
  display: inline-block; margin-right: 2px;
}
details.reasoning[open] summary::before { transform: rotate(45deg); }
.reasoning-body {
  margin-top: 8px; padding-left: 12px;
  border-left: 2px solid var(--border);
  color: var(--text-2); font-size: 13px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}

.tool-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tool-head {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: var(--bg);
  font-size: 12.5px;
  cursor: pointer; user-select: none;
}
.tool-head .name { font-family: var(--mono); font-weight: 500; flex: none; }
.tool-head .args {
  font-family: var(--mono); color: var(--text-2);
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tool-head .st { flex: none; font-size: 12px; color: var(--text-3); display: inline-flex; align-items: center; gap: 5px; }
.tool-head .st.err { color: var(--err); }
.tool-head .st.ok::before { content: ""; width: 4px; height: 8px;
  border-right: 1.5px solid var(--ok); border-bottom: 1.5px solid var(--ok);
  transform: rotate(45deg); display: inline-block; margin-right: 1px; }
.spinner {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1.5px solid var(--border-2); border-top-color: var(--text-2);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.tool-body { display: none; border-top: 1px solid var(--border); }
.tool-card.open .tool-body { display: block; }
.tool-body pre {
  margin: 0; padding: 10px 12px;
  font: 12px var(--mono); line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
  max-height: 320px; overflow-y: auto;
  color: var(--text-2);
}

.approval-card { border: 1px solid var(--warn-border); border-radius: 10px; overflow: hidden; }
.approval-head {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--warn-bg);
  font-size: 12.5px;
}
.approval-head .t { font-weight: 500; color: var(--warn); }
.approval-head .name { font-family: var(--mono); color: var(--warn); }
.risk-badge {
  margin-left: auto;
  font-size: 11px; padding: 2px 8px; border-radius: 999px;
  background: var(--warn); color: var(--surface);
}
.approval-cmd {
  margin: 0; padding: 10px 12px;
  font: 13px var(--mono); line-height: 1.6;
  white-space: pre-wrap; word-break: break-all;
  max-height: 160px; overflow-y: auto;
}
.approval-reason { padding: 0 12px 8px; font-size: 12.5px; color: var(--text-2); }
.approval-actions { display: flex; gap: 8px; padding: 0 12px 12px; }
.approval-actions button {
  font: 12.5px var(--sans);
  padding: 5px 14px;
  border: 1px solid var(--border-2); border-radius: 8px;
  background: var(--surface); color: var(--text);
  cursor: pointer;
}
.approval-actions button:hover { background: var(--surface-2); }
.approval-actions button.reject { color: var(--err); border-color: var(--err); }
.approval-done { padding: 0 12px 10px; font-size: 12.5px; color: var(--text-3); }

.notice { align-self: center; font-size: 12.5px; color: var(--text-3); text-align: center; }
.notice.error { color: var(--err); }

/* ── 输入区 ───────────────────────────── */
#composer-wrap { flex: none; padding: 10px 28px 18px; max-width: 836px; margin: 0 auto; width: 100%; }
#attach-previews { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 2px 8px; }
.attach-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-2);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 4px 8px; background: var(--bg);
}
.attach-chip img { width: 22px; height: 22px; object-fit: cover; border-radius: 4px; }
.attach-chip button { border: 0; background: none; color: var(--text-3); cursor: pointer; padding: 0 2px; font-size: 13px; }
#composer {
  border: 1px solid var(--border-2);
  border-radius: 14px;
  background: var(--surface);
  transition: border-color .15s, box-shadow .15s;
}
#composer:focus-within { border-color: var(--text-3); box-shadow: 0 1px 8px rgba(0,0,0,.04); }
#input {
  display: block; width: 100%;
  border: 0; outline: 0; resize: none;
  background: transparent; color: var(--text);
  font: 15px/1.6 var(--sans);
  padding: 12px 14px 4px;
  max-height: 200px;
}
#input::placeholder { color: var(--text-3); }
.composer-bar { display: flex; align-items: center; gap: 4px; padding: 4px 8px 8px; }
#model-select {
  appearance: none; -webkit-appearance: none;
  border: 0; outline: 0; background: transparent;
  color: var(--text-2); font: 12.5px var(--sans);
  padding: 4px 6px; border-radius: 6px; cursor: pointer;
  max-width: 220px; text-overflow: ellipsis;
}
#model-select:hover { background: var(--surface-2); color: var(--text); }
#ctx-pct { font-size: 12px; color: var(--text-3); margin-right: 4px; }
#send-btn, #stop-btn {
  width: 30px; height: 30px; flex: none;
  border-radius: 50%; border: 0; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
#send-btn { background: var(--btn-bg); color: var(--btn-fg); }
#send-btn:disabled { opacity: .3; cursor: default; }
#stop-btn { background: transparent; border: 1px solid var(--border-2); color: var(--text-2); }
#stop-btn:hover { border-color: var(--err); color: var(--err); }

#banner {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  background: var(--err-bg); color: var(--err);
  border: 1px solid var(--err);
  font-size: 12.5px; padding: 6px 16px; border-radius: 999px;
  display: none; z-index: 10;
}
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<aside>
  <div class="side-head">
    <span class="wordmark">Navi</span>
    <button class="icon-btn" id="new-chat" title="新会话" aria-label="新会话">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
    </button>
  </div>
  <input id="session-filter" placeholder="搜索会话" autocomplete="off">
  <nav id="session-list"></nav>
  <div id="gateways">
    <h3>网关</h3>
    <div id="gw-list"></div>
  </div>
</aside>

<main>
  <header>
    <span id="workspace"></span>
    <span class="spacer"></span>
    <span class="pill" id="approval-pill"></span>
    <span id="conn-dot" title="连接状态"></span>
  </header>
  <div id="chat-scroll"><div id="chat"></div></div>
  <div id="composer-wrap">
    <div id="attach-previews"></div>
    <div id="composer">
      <textarea id="input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
      <div class="composer-bar">
        <button class="icon-btn" id="attach-btn" title="附加图片" aria-label="附加图片">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M13.2 7.3 8.2 12.4a3.4 3.4 0 0 1-4.8-4.8l5.3-5.3a2.3 2.3 0 0 1 3.2 3.2L6.7 10.7a1.1 1.1 0 0 1-1.6-1.6l4.6-4.6"/></svg>
        </button>
        <input type="file" id="file-input" accept="image/*" multiple hidden>
        <select id="model-select" title="切换模型"></select>
        <span class="spacer"></span>
        <span id="ctx-pct"></span>
        <button id="stop-btn" title="中断 (Esc)" aria-label="中断" hidden>
          <svg width="11" height="11" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="2" fill="currentColor"/></svg>
        </button>
        <button id="send-btn" title="发送" aria-label="发送" disabled>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V3M3.5 7.5 8 3l4.5 4.5"/></svg>
        </button>
      </div>
    </div>
  </div>
</main>

<div id="banner">连接已断开，正在重连…</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script>
<script>
(() => {
"use strict";

const qs = new URLSearchParams(location.search);
const token = qs.get("token") || "";
let sessionId = qs.get("session") || "";

const $ = (id) => document.getElementById(id);
const chat = $("chat");
const scroller = $("chat-scroll");
const input = $("input");

let ws = null;
let ready = false;               // 收到 init 前不允许发送
let fatal = false;               // 服务端初始化失败，停止自动重连
let busy = false;
let streamed = false;            // 本轮是否已流式输出过正文
let current = null;              // { el, text } 正在流式的正文块
let reasoning = null;            // { details, body, text } 正在流式的思考块
const openTools = {};            // tool_name -> [card...]
const pendingApprovals = [];     // 未响应的审批卡片
let attachments = [];            // { name, b64, url }
const MAX_IMAGE_ATTACHMENT_BYTES = 3 * 1000 * 1000;

// ── 工具函数 ──────────────────────────────────────────────────────────────

function esc(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function md(text) {
  if (window.marked) return marked.parse(text, { breaks: true, mangle: false, headerIds: false });
  return "<p>" + esc(text).replace(/\n/g, "<br>") + "</p>";
}

function nearBottom() {
  return scroller.scrollHeight - scroller.scrollTop - scroller.clientHeight < 120;
}
function scrollDown(force) {
  if (force || nearBottom()) scroller.scrollTop = scroller.scrollHeight;
}

function el(tag, cls, parent) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  (parent || chat).appendChild(node);
  return node;
}

function relTime(iso) {
  const t = new Date(iso);
  if (isNaN(t)) return "";
  const diff = (Date.now() - t.getTime()) / 1000;
  if (diff < 60) return "刚刚";
  if (diff < 3600) return Math.floor(diff / 60) + " 分钟前";
  if (diff < 86400) return Math.floor(diff / 3600) + " 小时前";
  if (diff < 172800) return "昨天";
  return (t.getMonth() + 1) + "月" + t.getDate() + "日";
}

function summarizeArgs(args) {
  if (!args || typeof args !== "object") return "";
  const parts = [];
  for (const [k, v] of Object.entries(args)) {
    const s = typeof v === "string" ? v : JSON.stringify(v);
    parts.push(k + "=" + (s.length > 80 ? s.slice(0, 80) + "…" : s));
  }
  return parts.join("  ");
}

// ── 渲染 ─────────────────────────────────────────────────────────────────

function addUser(text, imageNames) {
  const div = el("div", "msg-user");
  for (const name of imageNames || []) {
    const tag = document.createElement("span");
    tag.className = "img-tag";
    tag.textContent = "🖼 " + name;
    div.appendChild(tag);
  }
  div.appendChild(document.createTextNode(text));
  scrollDown(true);
}

function addAssistant(text) {
  const div = el("div", "msg-assistant");
  div.innerHTML = md(text);
  scrollDown();
  return div;
}

function ensureCurrent() {
  if (!current) {
    current = { el: el("div", "msg-assistant"), text: "", raf: 0 };
  }
  return current;
}

function renderCurrent() {
  if (!current || current.raf) return;
  current.raf = requestAnimationFrame(() => {
    if (!current) return;
    current.raf = 0;
    current.el.innerHTML = md(current.text);
    scrollDown();
  });
}

function finishCurrent() {
  if (!current) return;
  if (current.raf) cancelAnimationFrame(current.raf);
  current.el.innerHTML = md(current.text);
  if (!current.text.trim()) current.el.remove();
  current = null;
  scrollDown();
}

function ensureReasoning() {
  if (!reasoning) {
    const details = el("details", "reasoning");
    details.open = true;
    const summary = document.createElement("summary");
    summary.textContent = "思考中…";
    details.appendChild(summary);
    const body = document.createElement("div");
    body.className = "reasoning-body";
    details.appendChild(body);
    reasoning = { details, summary, body, text: "" };
  }
  return reasoning;
}

function finishReasoning() {
  if (!reasoning) return;
  if (!reasoning.text.trim()) {
    reasoning.details.remove();
  } else {
    reasoning.summary.textContent = "思考过程";
    reasoning.details.open = false;
  }
  reasoning = null;
}

function addToolCard(name, args) {
  const card = el("div", "tool-card");
  const head = document.createElement("div");
  head.className = "tool-head";
  head.innerHTML =
    '<span class="name">' + esc(name) + "</span>" +
    '<span class="args">' + esc(summarizeArgs(args)) + "</span>" +
    '<span class="st"><span class="spinner"></span></span>';
  card.appendChild(head);
  const body = document.createElement("div");
  body.className = "tool-body";
  body.innerHTML = "<pre></pre>";
  card.appendChild(body);
  head.addEventListener("click", () => card.classList.toggle("open"));
  const record = { card, st: head.querySelector(".st"), pre: body.querySelector("pre") };
  (openTools[name] = openTools[name] || []).push(record);
  scrollDown();
  return record;
}

function takeToolCard(name) {
  const list = openTools[name];
  return list && list.length ? list.shift() : null;
}

function toolResultText(result) {
  if (result == null) return "";
  if (typeof result === "string") return result;
  if (typeof result === "object") {
    if (typeof result.output === "string" && result.output) return result.output;
    if (typeof result.content === "string" && result.content) return result.content;
    return JSON.stringify(result, null, 2);
  }
  return String(result);
}

function addApprovalCard(ev) {
  const card = el("div", "approval-card");
  const head = document.createElement("div");
  head.className = "approval-head";
  head.innerHTML =
    '<span class="t">需要审批</span><span class="name">' + esc(ev.tool_name) + "</span>" +
    '<span class="risk-badge">' + esc(riskLabel(ev.risk)) + "</span>";
  card.appendChild(head);
  if (ev.command) {
    const pre = document.createElement("pre");
    pre.className = "approval-cmd";
    pre.textContent = ev.command;
    card.appendChild(pre);
  }
  if (ev.reason) {
    const reason = document.createElement("div");
    reason.className = "approval-reason";
    reason.textContent = ev.reason;
    card.appendChild(reason);
  }
  const actions = document.createElement("div");
  actions.className = "approval-actions";
  const record = { card, actions, done: false };
  const mk = (label, choice, cls) => {
    const btn = document.createElement("button");
    btn.textContent = label;
    if (cls) btn.className = cls;
    btn.addEventListener("click", () => {
      if (record.done) return;
      send({ type: "approval_response", choice });
      settleApproval(record, "已选择：" + label);
    });
    actions.appendChild(btn);
  };
  mk("本次允许", "allow_once");
  mk("本会话允许", "allow_session");
  mk("拒绝", "reject", "reject");
  card.appendChild(actions);
  pendingApprovals.push(record);
  scrollDown(true);
}

function riskLabel(risk) {
  return { safe: "低风险", unknown: "未知", risky: "有风险", dangerous: "高风险" }[risk] || risk;
}

function settleApproval(record, text) {
  record.done = true;
  const done = document.createElement("div");
  done.className = "approval-done";
  done.textContent = text;
  record.actions.replaceWith(done);
}

function expireApprovals(text) {
  while (pendingApprovals.length) {
    const record = pendingApprovals.shift();
    if (!record.done) settleApproval(record, text);
  }
}

function addNotice(text, isError) {
  const div = el("div", "notice" + (isError ? " error" : ""));
  div.textContent = text;
  scrollDown();
}

// ── 事件分发 ─────────────────────────────────────────────────────────────

function dispatch(ev) {
  switch (ev.type) {
    case "init": {
      ready = true;
      setBusy(false);
      if (ev.session_id && ev.session_id !== qs.get("session")) {
        qs.set("session", ev.session_id);
        history.replaceState(null, "", "?" + qs.toString());
      }
      $("workspace").textContent = ev.workspace;
      $("approval-pill").textContent = "审批 " + ev.approval_mode;
      sessionId = ev.session_id;
      updateStatus(ev);
      fillModelSelect(ev.model_options, ev.model_info);
      chat.innerHTML = "";
      for (const msg of ev.history || []) {
        if (msg.role === "user") addUser(msg.content, []);
        else addAssistant(msg.content);
      }
      scrollDown(true);
      break;
    }
    case "reasoning_start": ensureReasoning(); break;
    case "reasoning_delta": {
      const r = ensureReasoning();
      r.text += ev.content || "";
      r.body.textContent = r.text;
      scrollDown();
      break;
    }
    case "reasoning_end": finishReasoning(); break;
    case "assistant_delta": {
      finishReasoning();
      streamed = true;
      ensureCurrent().text += ev.content || "";
      renderCurrent();
      break;
    }
    case "assistant_end": finishCurrent(); break;
    case "assistant_content":
      // 流式段落已经渲染过；只有非流式路径（无 current）才补渲染
      if (!current && !streamed) { addAssistant(ev.content || ""); streamed = true; }
      break;
    case "tool_start": {
      finishReasoning();
      finishCurrent();
      addToolCard(ev.tool_name, ev.tool_args);
      break;
    }
    case "tool_result": {
      const record = takeToolCard(ev.tool_name);
      if (!record) break;
      record.st.innerHTML = "";
      record.st.className = "st ok";
      record.st.appendChild(document.createTextNode((ev.elapsed || 0).toFixed(1) + "s"));
      record.pre.textContent = toolResultText(ev.tool_result) || "（无输出）";
      break;
    }
    case "tool_error": {
      const record = takeToolCard(ev.tool_name);
      if (record) {
        record.st.textContent = "✗";
        record.st.className = "st err";
        record.pre.textContent = ev.error || "执行失败";
        record.card.classList.add("open");
      } else {
        addNotice(ev.tool_name + "：" + (ev.error || "执行失败"), true);
      }
      break;
    }
    case "approval_request": addApprovalCard(ev); break;
    case "approval_batch_done": expireApprovals("已处理"); break;
    case "turn_end": {
      finishReasoning();
      finishCurrent();
      expireApprovals("已取消");
      setBusy(false);
      if (!streamed && ev.final_answer) addAssistant(ev.final_answer);
      if (!ev.ok && ev.error) addNotice(ev.error, true);
      for (const path of ev.pending_attachments || []) addNotice("产物文件：" + path);
      updateStatus(ev);
      if (ev.session_id && ev.session_id !== qs.get("session")) {
        qs.set("session", ev.session_id);
        history.replaceState(null, "", "?" + qs.toString());
      }
      loadSessions();
      break;
    }
    case "model_switched": {
      if (!ev.ok) addNotice("模型切换失败", true);
      const info = ev.model_info || {};
      $("model-select").value = info.current_provider + "/" + info.current_model;
      break;
    }
    case "fatal":
      fatal = true;
      $("ctx-pct").textContent = "";
      addNotice(ev.error || "初始化失败", true);
      break;
    case "notice": addNotice(ev.text || ""); break;
    case "retry": addNotice(ev.message || "正在重试…"); break;
    case "compress_error": addNotice(ev.message || "上下文压缩失败", true); break;
  }
}

function updateStatus(ev) {
  const pct = ev.context_pct != null ? ev.context_pct : "";
  $("ctx-pct").textContent = ev.model_name ? ev.model_name + " · " + pct + "%" : "";
}

function fillModelSelect(options, info) {
  const select = $("model-select");
  select.innerHTML = "";
  for (const opt of options || []) {
    const node = document.createElement("option");
    node.value = opt.provider + "/" + opt.model;
    node.textContent = opt.provider + " / " + opt.model;
    select.appendChild(node);
  }
  if (info) select.value = info.current_provider + "/" + info.current_model;
}

// ── WebSocket ────────────────────────────────────────────────────────────

function send(payload) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
}

function connect() {
  const params = new URLSearchParams({ token });
  if (sessionId) params.set("session", sessionId);
  ws = new WebSocket(`ws://${location.host}/ws?` + params);
  ws.onopen = () => {
    $("conn-dot").classList.add("on");
    $("banner").style.display = "none";
    if (!ready) $("ctx-pct").textContent = "正在初始化…";
  };
  ws.onmessage = (msg) => {
    try { dispatch(JSON.parse(msg.data)); } catch (e) { console.error(e, msg.data); }
  };
  ws.onclose = () => {
    ready = false;
    $("conn-dot").classList.remove("on");
    setBusy(false);
    $("send-btn").disabled = true;
    if (fatal) return;
    $("banner").style.display = "block";
    setTimeout(connect, 2000);
  };
}

// ── 输入区 ───────────────────────────────────────────────────────────────

function setBusy(value) {
  busy = value;
  $("send-btn").disabled = value;
  $("stop-btn").hidden = !value;
}

function autoGrow() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 200) + "px";
}

function sendMessage() {
  const text = input.value.trim();
  if (!ready || busy || (!text && !attachments.length)) return;
  send({
    type: "user_message",
    text,
    images: attachments.map((a) => ({ name: a.name, data: a.b64 })),
  });
  addUser(text, attachments.map((a) => a.name));
  input.value = "";
  autoGrow();
  attachments = [];
  renderAttachments();
  streamed = false;
  setBusy(true);
}

function renderAttachments() {
  const box = $("attach-previews");
  box.innerHTML = "";
  attachments.forEach((att, index) => {
    const chip = document.createElement("span");
    chip.className = "attach-chip";
    const img = document.createElement("img");
    img.src = att.url;
    chip.appendChild(img);
    chip.appendChild(document.createTextNode(att.name));
    const remove = document.createElement("button");
    remove.textContent = "×";
    remove.title = "移除";
    remove.addEventListener("click", () => { attachments.splice(index, 1); renderAttachments(); });
    chip.appendChild(remove);
    box.appendChild(chip);
  });
}

function attachFile(file) {
  const name = file.name || "image.png";
  if (file.type && !file.type.startsWith("image/")) {
    addNotice("只能附加图片：" + name, true);
    return;
  }
  if (file.size > MAX_IMAGE_ATTACHMENT_BYTES) {
    addNotice("图片超过 3MB，已拒绝上传：" + name, true);
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    const url = String(reader.result);
    attachments.push({ name, b64: url.split(",", 2)[1] || "", url });
    renderAttachments();
  };
  reader.readAsDataURL(file);
}

input.addEventListener("input", autoGrow);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMessage();
  }
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && busy) send({ type: "interrupt" });
});
input.addEventListener("paste", (e) => {
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith("image/")) {
      const file = item.getAsFile();
      if (file) attachFile(file);
      e.preventDefault();
    }
  }
});
$("send-btn").addEventListener("click", sendMessage);
$("stop-btn").addEventListener("click", () => send({ type: "interrupt" }));
$("attach-btn").addEventListener("click", () => $("file-input").click());
$("file-input").addEventListener("change", (e) => {
  for (const file of e.target.files) attachFile(file);
  e.target.value = "";
});
$("model-select").addEventListener("change", (e) => {
  const [provider, ...rest] = e.target.value.split("/");
  send({ type: "switch_model", provider, model: rest.join("/") });
});
$("new-chat").addEventListener("click", () => {
  location.href = "/?token=" + encodeURIComponent(token);
});

// ── 会话列表 ─────────────────────────────────────────────────────────────

let allSessions = [];

async function loadSessions() {
  try {
    const resp = await fetch("/api/sessions?token=" + encodeURIComponent(token));
    if (!resp.ok) return;
    allSessions = await resp.json();
    renderSessions();
  } catch (e) { /* 网络瞬断，忽略 */ }
}

function renderSessions() {
  const filter = $("session-filter").value.trim().toLowerCase();
  const list = $("session-list");
  list.innerHTML = "";
  const items = allSessions.filter(
    (s) => !filter || (s.title || "").toLowerCase().includes(filter)
  );
  if (!items.length) {
    const div = document.createElement("div");
    div.className = "side-empty";
    div.textContent = filter ? "没有匹配的会话" : "暂无历史会话";
    list.appendChild(div);
    return;
  }
  for (const s of items) {
    const item = document.createElement("div");
    item.className = "session-item" + (s.session_id === sessionId ? " active" : "");
    const title = document.createElement("div");
    title.className = "title";
    title.textContent = s.title || "（未命名会话）";
    const time = document.createElement("div");
    time.className = "time";
    time.textContent = relTime(s.updated_at || s.created_at);
    item.appendChild(title);
    item.appendChild(time);
    item.addEventListener("click", () => {
      location.href = "/?token=" + encodeURIComponent(token) + "&session=" + encodeURIComponent(s.session_id);
    });
    list.appendChild(item);
  }
}

$("session-filter").addEventListener("input", renderSessions);

// ── 网关 ─────────────────────────────────────────────────────────────────

const GW_NAMES = { qq: "QQ", weixin: "微信" };

async function loadGateways() {
  try {
    const resp = await fetch("/api/gateways?token=" + encodeURIComponent(token));
    if (!resp.ok) return;
    renderGateways(await resp.json());
  } catch (e) { /* ignore */ }
}

function renderGateways(status) {
  const box = $("gw-list");
  box.innerHTML = "";
  for (const kind of Object.keys(GW_NAMES)) {
    const gw = status[kind] || { accounts: [], running: false };
    const row = document.createElement("div");
    row.className = "gw-row";
    const dot = document.createElement("span");
    dot.className = "gw-dot" + (gw.running ? " on" : gw.error ? " err" : "");
    row.appendChild(dot);
    const name = document.createElement("span");
    name.className = "gw-name";
    name.textContent = GW_NAMES[kind];
    row.appendChild(name);
    const account = document.createElement("span");
    account.className = "gw-account";
    account.textContent = gw.running ? gw.account
      : gw.accounts.length ? gw.accounts.join(", ")
      : "未登录";
    account.title = account.textContent;
    row.appendChild(account);
    const btn = document.createElement("button");
    btn.className = "gw-btn";
    btn.textContent = gw.running ? "停止" : "启动";
    btn.disabled = !gw.running && !gw.accounts.length;
    btn.addEventListener("click", () => toggleGateway(kind, gw));
    row.appendChild(btn);
    box.appendChild(row);
    if (gw.error && !gw.running) {
      const err = document.createElement("div");
      err.className = "gw-error";
      err.textContent = gw.error;
      box.appendChild(err);
    }
  }
}

async function toggleGateway(kind, gw) {
  const action = gw.running ? "stop" : "start";
  const body = {};
  if (action === "start" && gw.accounts.length > 1) {
    const account = prompt("多个账号，请输入要启动的账号：\n" + gw.accounts.join("\n"));
    if (!account) return;
    body.account = account.trim();
  }
  try {
    const resp = await fetch(
      `/api/gateways/${kind}/${action}?token=` + encodeURIComponent(token),
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
    );
    const data = await resp.json();
    if (!resp.ok) addNotice(data.error || "网关操作失败", true);
  } catch (e) {
    addNotice("网关操作失败：" + e, true);
  }
  loadGateways();
}

// ── 启动 ─────────────────────────────────────────────────────────────────

connect();
loadSessions();
loadGateways();
setInterval(loadGateways, 10000);
autoGrow();
input.focus();

})();
</script>
